raw:
  # eICU 2.0: all files are .csv.gz; pandas read_csv decompresses automatically.
  treatment: /Volumes/Extreme_SSD/eicu-collaborative-research-database-2.0/treatment.csv.gz
  lab: /Volumes/Extreme_SSD/eicu-collaborative-research-database-2.0/lab.csv.gz
  intakeoutput: /Volumes/Extreme_SSD/eicu-collaborative-research-database-2.0/intakeOutput.csv.gz
  diagnosis: /Volumes/Extreme_SSD/eicu-collaborative-research-database-2.0/diagnosis.csv.gz
  infusiondrug: /Volumes/Extreme_SSD/eicu-collaborative-research-database-2.0/infusionDrug.csv.gz
  respiratorycare: /Volumes/Extreme_SSD/eicu-collaborative-research-database-2.0/respiratoryCharting.csv.gz
  patient: /Volumes/Extreme_SSD/eicu-collaborative-research-database-2.0/patient.csv.gz

terms:
  # CRRT takes precedence over IHD for ambiguous strings.
  crrt: ["cvvh", "cvvhd", "cvvhdf", "crrt", "continuous renal replacement", "scuf"]
  ihd: ["hemodialysis", "ihd", "sled", "sustained low efficiency"]
  creatinine: ["creatinine"]
  urine: ["urine", "foley", "void"]
  septic_shock: ["septic shock"]
  vasopressor: ["norepinephrine", "epinephrine", "vasopressin", "dopamine", "phenylephrine"]
  ventilation: ["ventilator", "mechanical vent", "intubat"]

merge_gap_minutes: 360.0

paths:
  data_dir: data
  output_dir: ${paths.data_dir}/eicu
