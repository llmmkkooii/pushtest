<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>格闘ゲーム - Fight Club</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
    color: #eaeaea;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .wrap {
    width: 100%;
    max-width: 820px;
    transition: max-width 0.25s ease;
  }
  .wrap.zoom-2 { max-width: 1020px; }
  .wrap.zoom-3 { max-width: 1280px; }
  .wrap.zoom-4 { max-width: 1600px; }
  h1 {
    text-align: center;
    margin: 0 0 16px;
    font-size: 28px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #4af, #f64);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #hud {
    display: none;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .hp-bar {
    flex: 1;
    height: 22px;
    background: #222;
    border: 2px solid #555;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .hp-bar.right { transform: scaleX(-1); }
  .hp-fill { height: 100%; width: 100%; transition: width 0.15s; }
  #p-hp { background: linear-gradient(90deg, #2c5, #4af); }
  #c-hp { background: linear-gradient(90deg, #f64, #f23); }
  .name-tag {
    font-weight: bold;
    font-size: 13px;
    min-width: 90px;
    letter-spacing: 1px;
  }
  .name-tag.right { text-align: right; }
  .name-tag .char-label {
    display: block;
    color: #aaa;
    font-size: 10px;
    font-weight: normal;
    letter-spacing: 0.5px;
  }
  #timer-box {
    background: #000;
    border: 2px solid #f93;
    color: #f93;
    padding: 4px 14px;
    border-radius: 4px;
    font-weight: bold;
    font-family: 'SF Mono', monospace;
    font-size: 20px;
    min-width: 56px;
    text-align: center;
  }
  #game-area {
    position: relative;
    border: 3px solid #444;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(74, 170, 255, 0.18);
  }
  canvas {
    display: block;
    background: #1a1a2e;
    width: 100%;
    height: auto;
  }
  .wrap:fullscreen {
    background: #0f0f1e;
    padding: 16px;
    max-width: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .wrap:fullscreen #game-area {
    flex: 0 1 auto;
    margin: 0 auto;
    max-width: calc(100vh * 2);
    width: 100%;
  }
  .wrap:fullscreen h1 { display: none; }
  .wrap:fullscreen #controls { margin-top: 10px; }

  #menu, #gameover {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    padding: 14px;
  }
  #gameover { display: none; }
  .menu-title {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 5px;
    background: linear-gradient(90deg, #4af, #f64);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .select-label {
    font-size: 11px;
    color: #888;
    letter-spacing: 3px;
    margin-bottom: 2px;
  }
  .char-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 620px;
  }
  .char-card {
    background: #2a2a40;
    border: 2px solid #555;
    border-radius: 6px;
    padding: 6px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
  }
  .char-card:hover { background: #3a3a55; transform: translateY(-1px); }
  .char-card.active {
    background: #4af;
    border-color: #4af;
    color: #000;
  }
  .char-name { font-weight: bold; font-size: 14px; }
  .char-desc { font-size: 9px; color: #aaa; margin-top: 2px; letter-spacing: 0.5px; }
  .char-card.active .char-desc { color: #003; }
  .char-stats {
    font-size: 9px;
    color: #888;
    margin-top: 3px;
    font-family: 'SF Mono', monospace;
  }
  .char-card.active .char-stats { color: #013; }

  .diff-row { display: flex; gap: 10px; }
  .btn {
    background: #2a2a40;
    color: #eaeaea;
    border: 2px solid #555;
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { background: #3a3a55; transform: translateY(-1px); }
  .btn.active {
    background: #4af;
    border-color: #4af;
    color: #000;
    font-weight: bold;
  }
  .btn.primary {
    background: #f93;
    border-color: #f93;
    color: #000;
    font-weight: bold;
    padding: 10px 28px;
    font-size: 16px;
  }
  .btn.primary:hover { background: #fa4; }
  .btn.small { padding: 5px 11px; font-size: 12px; }

  #result-text {
    font-size: 44px;
    font-weight: 800;
    color: #f93;
    text-shadow: 0 0 20px rgba(255, 153, 51, 0.5);
  }
  #result-sub { font-size: 14px; color: #aaa; }
  .gameover-row { display: flex; gap: 12px; }
  #controls {
    margin-top: 16px;
    padding: 14px 18px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    border: 1px solid #333;
  }
  #controls h3 {
    margin: 0 0 10px;
    color: #4af;
    font-size: 13px;
    letter-spacing: 1px;
  }
  .keys-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    font-size: 13px;
  }
  kbd {
    display: inline-block;
    background: #333;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 1px 7px;
    font-family: 'SF Mono', monospace;
    font-size: 12px;
    color: #fff;
    margin-right: 4px;
    min-width: 22px;
    text-align: center;
  }
  .zoom-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #333;
    flex-wrap: wrap;
  }
  .zoom-row .lbl {
    font-size: 12px;
    color: #888;
    letter-spacing: 1px;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>格闘ゲーム</h1>

  <div id="hud">
    <span class="name-tag">PLAYER<span class="char-label" id="p-name">-</span></span>
    <div class="hp-bar"><div id="p-hp" class="hp-fill"></div></div>
    <div id="timer-box"><span id="timer">60</span></div>
    <div class="hp-bar right"><div id="c-hp" class="hp-fill"></div></div>
    <span class="name-tag right">CPU<span class="char-label" id="c-name">-</span></span>
  </div>

  <div id="game-area">
    <canvas id="game" width="800" height="400"></canvas>

    <div id="menu">
      <div class="menu-title">FIGHT CLUB</div>

      <div class="select-label">CHARACTER</div>
      <div class="char-grid" id="char-grid"></div>

      <div class="select-label">DIFFICULTY</div>
      <div class="diff-row">
        <button class="btn diff-btn" data-diff="easy">EASY</button>
        <button class="btn diff-btn active" data-diff="medium">NORMAL</button>
        <button class="btn diff-btn" data-diff="hard">HARD</button>
      </div>

      <button id="start-btn" class="btn primary">▶ 試合開始</button>
    </div>

    <div id="gameover">
      <div id="result-text">勝利!</div>
      <div id="result-sub"></div>
      <div class="gameover-row">
        <button id="restart-btn" class="btn primary">もう一度</button>
        <button id="menu-btn" class="btn">キャラ・難易度変更</button>
      </div>
    </div>
  </div>

  <div id="controls">
    <h3>操作方法</h3>
    <div class="keys-grid">
      <div><kbd>A</kbd><kbd>D</kbd> 移動</div>
      <div><kbd>W</kbd> ジャンプ</div>
      <div><kbd>S</kbd> ガード</div>
      <div><kbd>J</kbd> パンチ <span style="color:#888">(弱・速)</span></div>
      <div><kbd>K</kbd> キック <span style="color:#888">(強・遅)</span></div>
    </div>
    <div class="zoom-row">
      <span class="lbl">画面サイズ</span>
      <button class="btn small zoom-btn active" data-zoom="1">通常</button>
      <button class="btn small zoom-btn" data-zoom="2">大</button>
      <button class="btn small zoom-btn" data-zoom="3">特大</button>
      <button class="btn small zoom-btn" data-zoom="4">最大</button>
      <button class="btn small" id="fs-btn">⛶ フル画面</button>
    </div>
  </div>
</div>

<script>
'use strict';

const ARENA_W = 800;
const ARENA_H = 400;
const GROUND_Y = 350;
const GRAVITY = 0.8;

const CHARACTERS = {
  samurai: {
    name: '侍',
    desc: 'バランス型',
    color: '#4af', accent: '#fff', headgear: 'topknot',
    hp: 100, speed: 4,
    punchDmg: 9, kickDmg: 16,
    punchCd: 22, kickCd: 38,
    punchActive: 18, kickActive: 28,
    jumpV: -14
  },
  fighter: {
    name: '格闘家',
    desc: '高機動・低耐久',
    color: '#fa3', accent: '#fff', headgear: 'bandana',
    hp: 85, speed: 5,
    punchDmg: 8, kickDmg: 14,
    punchCd: 16, kickCd: 30,
    punchActive: 14, kickActive: 22,
    jumpV: -14
  },
  giant: {
    name: '巨漢',
    desc: '高耐久・低機動',
    color: '#a5f', accent: '#fff', headgear: 'horns',
    hp: 130, speed: 3,
    punchDmg: 12, kickDmg: 22,
    punchCd: 28, kickCd: 48,
    punchActive: 22, kickActive: 34,
    jumpV: -12
  },
  ninja: {
    name: '忍者',
    desc: '超高速・脆弱',
    color: '#444', accent: '#f33', headgear: 'mask',
    hp: 75, speed: 6,
    punchDmg: 7, kickDmg: 12,
    punchCd: 14, kickCd: 26,
    punchActive: 12, kickActive: 20,
    jumpV: -16
  },
  boxer: {
    name: 'ボクサー',
    desc: 'パンチ特化',
    color: '#f64', accent: '#ff0', headgear: 'gloves',
    hp: 95, speed: 4,
    punchDmg: 14, kickDmg: 9,
    punchCd: 14, kickCd: 44,
    punchActive: 12, kickActive: 30,
    jumpV: -13
  }
};

class Fighter {
  constructor(x, charKey, isPlayer) {
    const cfg = CHARACTERS[charKey];
    this.charKey = charKey;
    this.cfg = cfg;
    this.x = x;
    this.y = GROUND_Y;
    this.vx = 0;
    this.vy = 0;
    this.w = 40;
    this.h = 80;
    this.color = cfg.color;
    this.accent = cfg.accent;
    this.headgear = cfg.headgear;
    this.isPlayer = isPlayer;
    this.facing = isPlayer ? 1 : -1;
    this.maxHp = cfg.hp;
    this.hp = cfg.hp;
    this.speed = cfg.speed;
    this.state = 'idle';
    this.attackTimer = 0;
    this.attackCooldown = 0;
    this.blockTimer = 0;
    this.hitstun = 0;
    this.attackType = null;
    this.hasHit = false;
    this.onGround = true;
    this.flashTimer = 0;
  }

  punch() {
    if (this.attackCooldown > 0 || this.hitstun > 0 || this.state === 'ko') return;
    this.state = 'punching';
    this.attackType = 'punch';
    this.attackTimer = this.cfg.punchActive;
    this.attackCooldown = this.cfg.punchCd;
    this.hasHit = false;
  }

  kick() {
    if (this.attackCooldown > 0 || this.hitstun > 0 || this.state === 'ko') return;
    this.state = 'kicking';
    this.attackType = 'kick';
    this.attackTimer = this.cfg.kickActive;
    this.attackCooldown = this.cfg.kickCd;
    this.hasHit = false;
  }

  block() {
    if (this.hitstun > 0 || this.state === 'ko' || this.attackCooldown > 0) return;
    this.state = 'blocking';
    this.blockTimer = 6;
  }

  jump() {
    if (this.onGround && this.state !== 'ko' && this.hitstun === 0 && this.attackTimer === 0) {
      this.vy = this.cfg.jumpV;
      this.onGround = false;
      this.state = 'jumping';
    }
  }

  takeDamage(amount, fromX) {
    let final = amount;
    if (this.state === 'blocking') final = Math.floor(amount * 0.2);
    this.hp = Math.max(0, this.hp - final);
    this.hitstun = this.state === 'blocking' ? 6 : 16;
    this.flashTimer = 8;
    if (this.state !== 'blocking') {
      this.vx = (this.x < fromX ? -3 : 3);
      this.attackTimer = 0;
      this.attackType = null;
    }
    if (this.hp <= 0) {
      this.state = 'ko';
    } else if (this.state !== 'blocking') {
      this.state = 'hit';
    }
  }

  getHitbox() {
    if (!this.attackType || this.hasHit) return null;
    const t = this.attackTimer;
    const total = this.attackType === 'punch' ? this.cfg.punchActive : this.cfg.kickActive;
    const elapsed = total - t;
    if (this.attackType === 'punch' && elapsed > 4 && elapsed < Math.min(12, total - 2)) {
      const reach = this.headgear === 'gloves' ? 62 : 55;
      const hx = this.facing === 1 ? this.x + this.w : this.x - reach;
      return { x: hx, y: this.y - 60, w: reach, h: 22, damage: this.cfg.punchDmg };
    }
    if (this.attackType === 'kick' && elapsed > 6 && elapsed < Math.min(20, total - 4)) {
      const reach = this.headgear === 'horns' ? 80 : 72;
      const hx = this.facing === 1 ? this.x + this.w : this.x - reach;
      return { x: hx, y: this.y - 42, w: reach, h: 24, damage: this.cfg.kickDmg };
    }
    return null;
  }

  getBody() {
    return { x: this.x, y: this.y - this.h, w: this.w, h: this.h };
  }

  update() {
    if (!this.onGround) {
      this.vy += GRAVITY;
      this.y += this.vy;
      if (this.y >= GROUND_Y) {
        this.y = GROUND_Y;
        this.vy = 0;
        this.onGround = true;
        if (this.state === 'jumping') this.state = 'idle';
      }
    }
    this.x += this.vx;
    if (this.hitstun > 0 || this.state === 'ko') this.vx *= 0.85;
    this.x = Math.max(0, Math.min(ARENA_W - this.w, this.x));

    if (this.attackTimer > 0) {
      this.attackTimer--;
      if (this.attackTimer === 0) {
        this.attackType = null;
        if (this.state === 'punching' || this.state === 'kicking') {
          this.state = this.onGround ? 'idle' : 'jumping';
        }
      }
    }
    if (this.attackCooldown > 0) this.attackCooldown--;
    if (this.blockTimer > 0) {
      this.blockTimer--;
      if (this.blockTimer === 0 && this.state === 'blocking') this.state = 'idle';
    }
    if (this.hitstun > 0) {
      this.hitstun--;
      if (this.hitstun === 0 && this.state === 'hit') {
        this.state = 'idle';
        this.vx = 0;
      }
    }
    if (this.flashTimer > 0) this.flashTimer--;
  }

  drawHeadgear(ctx, cx, headCy) {
    ctx.fillStyle = this.accent;
    switch (this.headgear) {
      case 'topknot':
        ctx.fillStyle = '#222';
        ctx.fillRect(cx - 4, headCy - 22, 8, 8);
        ctx.fillStyle = this.accent;
        ctx.fillRect(cx - 7, headCy - 18, 14, 3);
        break;
      case 'bandana':
        ctx.fillStyle = this.accent;
        ctx.fillRect(cx - 14, headCy - 18, 28, 5);
        // tail
        ctx.fillRect(cx - this.facing * 18 - (this.facing === 1 ? 0 : 0), headCy - 14, 6, 12);
        break;
      case 'horns':
        ctx.fillStyle = this.accent;
        ctx.beginPath();
        ctx.moveTo(cx - 12, headCy - 12);
        ctx.lineTo(cx - 18, headCy - 24);
        ctx.lineTo(cx - 7, headCy - 14);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx + 12, headCy - 12);
        ctx.lineTo(cx + 18, headCy - 24);
        ctx.lineTo(cx + 7, headCy - 14);
        ctx.closePath();
        ctx.fill();
        break;
      case 'mask':
        // Ninja mask covering lower face
        ctx.fillStyle = this.accent;
        ctx.fillRect(cx - 13, headCy - 5, 26, 6);
        // headband
        ctx.fillRect(cx - 14, headCy - 18, 28, 4);
        ctx.fillRect(cx + this.facing * 8, headCy - 16, 8, 14);
        break;
      case 'gloves':
        // Boxing headgear
        ctx.fillStyle = '#222';
        ctx.fillRect(cx - 14, headCy - 18, 28, 5);
        ctx.fillStyle = this.accent;
        ctx.fillRect(cx - 14, headCy - 14, 4, 12);
        ctx.fillRect(cx + 10, headCy - 14, 4, 12);
        break;
    }
  }

  draw(ctx) {
    const cx = this.x + this.w / 2;
    const top = this.y - this.h;
    const headCy = top - 10;

    let bodyColor = this.color;
    if (this.state === 'blocking') bodyColor = '#999';
    if (this.flashTimer > 0 && this.flashTimer % 2 === 0) bodyColor = '#fff';
    if (this.state === 'ko') bodyColor = '#555';

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(cx, GROUND_Y + 2, 22, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    if (this.state === 'ko') {
      ctx.fillStyle = bodyColor;
      ctx.fillRect(this.x - 20, GROUND_Y - 20, this.w + 40, 18);
      ctx.beginPath();
      ctx.arc(this.x + (this.facing === 1 ? -22 : this.w + 22), GROUND_Y - 11, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f33';
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('K.O.', cx, GROUND_Y - 40);
      ctx.textAlign = 'left';
      return;
    }

    // Body
    ctx.fillStyle = bodyColor;
    ctx.fillRect(this.x, top, this.w, this.h);

    // Head
    ctx.beginPath();
    ctx.arc(cx, headCy, 14, 0, Math.PI * 2);
    ctx.fill();

    // Headgear (only when not flashing white)
    if (!(this.flashTimer > 0 && this.flashTimer % 2 === 0)) {
      this.drawHeadgear(ctx, cx, headCy);
    }

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx + this.facing * 3 - 2, headCy - 2, 4, 4);

    // Block shield indicator
    if (this.state === 'blocking') {
      ctx.strokeStyle = '#ff0';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx + this.facing * 25, top + this.h / 2, 28, -Math.PI / 2, Math.PI / 2, this.facing === -1);
      ctx.stroke();
    }

    // Punch arm
    if (this.state === 'punching') {
      const elapsed = this.cfg.punchActive - this.attackTimer;
      if (elapsed > 2 && elapsed < this.cfg.punchActive - 2) {
        ctx.fillStyle = bodyColor;
        const reach = this.headgear === 'gloves' ? 50 : 42;
        const armX = this.facing === 1 ? this.x + this.w : this.x - reach;
        ctx.fillRect(armX, top + 18, reach, 10);
        // Fist / glove
        ctx.fillStyle = this.headgear === 'gloves' ? '#f33' : '#fff';
        const fistX = this.facing === 1 ? armX + reach - 8 : armX;
        const fistSize = this.headgear === 'gloves' ? 14 : 10;
        ctx.fillRect(fistX, top + 16 - (fistSize - 10) / 2, fistSize, fistSize + 4);
      }
    }

    // Kick leg
    if (this.state === 'kicking') {
      const elapsed = this.cfg.kickActive - this.attackTimer;
      if (elapsed > 4 && elapsed < this.cfg.kickActive - 2) {
        ctx.fillStyle = bodyColor;
        const reach = this.headgear === 'horns' ? 70 : 60;
        const legX = this.facing === 1 ? this.x + this.w : this.x - reach;
        ctx.fillRect(legX, top + 38, reach, 12);
        ctx.fillStyle = '#222';
        const footX = this.facing === 1 ? legX + reach - 10 : legX;
        ctx.fillRect(footX, top + 36, 12, 16);
      }
    }
  }
}

const AI_CONFIG = {
  easy: {
    reaction: 45, aggressive: 0.35, blockChance: 0.18,
    moveAcc: 0.6, retreatHp: 0.25, kickPref: 0.3,
    optimalRange: 60, jumpChance: 0.005
  },
  medium: {
    reaction: 22, aggressive: 0.65, blockChance: 0.5,
    moveAcc: 0.85, retreatHp: 0.18, kickPref: 0.45,
    optimalRange: 55, jumpChance: 0.012
  },
  hard: {
    reaction: 8, aggressive: 0.92, blockChance: 0.82,
    moveAcc: 1.0, retreatHp: 0.1, kickPref: 0.55,
    optimalRange: 52, jumpChance: 0.02
  }
};

class AI {
  constructor(fighter, opponent, difficulty) {
    this.me = fighter;
    this.op = opponent;
    this.cfg = AI_CONFIG[difficulty];
    this.reactionTimer = 0;
  }

  step() {
    if (this.me.state === 'ko') {
      this.me.vx = 0;
      return;
    }
    if (this.reactionTimer > 0) {
      this.reactionTimer--;
      return;
    }

    const dx = this.op.x - this.me.x;
    const dist = Math.abs(dx);
    if (this.me.hitstun === 0 && this.me.attackTimer === 0) {
      this.me.facing = dx >= 0 ? 1 : -1;
    }

    if (this.me.hitstun > 0) return;

    // Defensive reaction
    const opAttacking = (this.op.state === 'punching' || this.op.state === 'kicking') &&
                        this.op.attackTimer > 4;
    if (opAttacking && dist < 95) {
      if (Math.random() < this.cfg.blockChance) {
        this.me.block();
        this.me.vx = 0;
        this.reactionTimer = Math.max(2, Math.floor(this.cfg.reaction / 3));
        return;
      }
    }

    // Attack
    const attackRange = 70 + (this.me.headgear === 'horns' ? 8 : 0);
    if (dist < attackRange && this.me.attackCooldown === 0 && this.me.onGround) {
      if (Math.random() < this.cfg.aggressive) {
        // Boxer prefers punch, others use kickPref
        let kickPref = this.cfg.kickPref;
        if (this.me.charKey === 'boxer') kickPref = 0.15;
        if (this.me.charKey === 'giant') kickPref = 0.65;
        if (Math.random() < kickPref) this.me.kick();
        else this.me.punch();
        this.me.vx = 0;
        this.reactionTimer = this.cfg.reaction + Math.floor(Math.random() * 8);
        return;
      }
    }

    // Random jump
    if (this.me.onGround && Math.random() < this.cfg.jumpChance) {
      this.me.jump();
    }

    // Movement
    const ideal = this.cfg.optimalRange;
    const hpRatio = this.me.hp / this.me.maxHp;
    if (hpRatio < this.cfg.retreatHp && dist < ideal) {
      this.me.vx = -this.me.facing * this.me.speed * 0.7;
    } else if (dist > ideal + 8) {
      this.me.vx = this.me.facing * this.me.speed * this.cfg.moveAcc;
    } else if (dist < ideal - 12) {
      this.me.vx = -this.me.facing * this.me.speed * 0.5;
    } else {
      this.me.vx = (Math.random() - 0.5) * 0.5;
    }

    this.reactionTimer = Math.floor(this.cfg.reaction * (0.7 + Math.random() * 0.6));
  }
}

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

class Game {
  constructor() {
    this.canvas = document.getElementById('game');
    this.ctx = this.canvas.getContext('2d');
    this.keys = {};
    this.justPressed = {};
    this.player = null;
    this.cpu = null;
    this.ai = null;
    this.state = 'menu';
    this.timer = 60 * 60;
    this.difficulty = 'medium';
    this.playerChar = 'samurai';
    this.shake = 0;
    this.particles = [];
    this.buildCharGrid();
    this.bindInput();
    this.bindUI();
  }

  buildCharGrid() {
    const grid = document.getElementById('char-grid');
    grid.innerHTML = '';
    Object.entries(CHARACTERS).forEach(([key, c], i) => {
      const card = document.createElement('div');
      card.className = 'char-card' + (key === this.playerChar ? ' active' : '');
      card.dataset.char = key;
      card.innerHTML = `
        <div class="char-name" style="color:${key === this.playerChar ? '#000' : c.color}">${c.name}</div>
        <div class="char-desc">${c.desc}</div>
        <div class="char-stats">HP${c.hp} SP${c.speed}</div>
      `;
      card.addEventListener('click', () => this.selectChar(key));
      grid.appendChild(card);
    });
  }

  selectChar(key) {
    this.playerChar = key;
    document.querySelectorAll('.char-card').forEach(c => {
      c.classList.toggle('active', c.dataset.char === key);
      const cfg = CHARACTERS[c.dataset.char];
      c.querySelector('.char-name').style.color = c.dataset.char === key ? '#000' : cfg.color;
    });
  }

  bindInput() {
    const blockKeys = ['arrowleft', 'arrowright', 'arrowup', 'arrowdown', ' '];
    window.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (blockKeys.includes(k)) e.preventDefault();
      if (!this.keys[k]) this.justPressed[k] = true;
      this.keys[k] = true;
    });
    window.addEventListener('keyup', e => {
      this.keys[e.key.toLowerCase()] = false;
    });
  }

  bindUI() {
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        this.difficulty = btn.dataset.diff;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    document.getElementById('start-btn').addEventListener('click', () => this.startMatch());
    document.getElementById('restart-btn').addEventListener('click', () => this.startMatch());
    document.getElementById('menu-btn').addEventListener('click', () => this.toMenu());

    // Zoom buttons
    document.querySelectorAll('.zoom-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const wrap = document.querySelector('.wrap');
        wrap.classList.remove('zoom-2', 'zoom-3', 'zoom-4');
        const z = btn.dataset.zoom;
        if (z !== '1') wrap.classList.add('zoom-' + z);
      });
    });

    // Fullscreen
    document.getElementById('fs-btn').addEventListener('click', () => {
      const wrap = document.querySelector('.wrap');
      if (!document.fullscreenElement) {
        if (wrap.requestFullscreen) wrap.requestFullscreen();
        else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    });
  }

  pickCpuChar() {
    const keys = Object.keys(CHARACTERS).filter(k => k !== this.playerChar);
    return keys[Math.floor(Math.random() * keys.length)];
  }

  startMatch() {
    const cpuChar = this.pickCpuChar();
    this.player = new Fighter(220, this.playerChar, true);
    this.cpu = new Fighter(540, cpuChar, false);
    this.cpu.facing = -1;
    this.ai = new AI(this.cpu, this.player, this.difficulty);
    this.timer = 60 * 60;
    this.state = 'playing';
    this.particles = [];
    document.getElementById('p-name').textContent = this.player.cfg.name;
    document.getElementById('c-name').textContent = this.cpu.cfg.name;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameover').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    this.updateHUD();
  }

  toMenu() {
    this.state = 'menu';
    document.getElementById('gameover').style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
  }

  endMatch() {
    let winner;
    let sub = '';
    const diffName = this.difficulty.toUpperCase();
    if (this.player.hp <= 0 && this.cpu.hp <= 0) {
      winner = 'DRAW'; sub = '相討ち';
    } else if (this.player.hp <= 0) {
      winner = 'LOSE'; sub = `${this.cpu.cfg.name} (${diffName}) に敗北`;
    } else if (this.cpu.hp <= 0) {
      winner = 'WIN'; sub = `${this.cpu.cfg.name} (${diffName}) を撃破!`;
    } else if (this.player.hp > this.cpu.hp) {
      winner = 'WIN'; sub = '時間切れ判定勝ち';
    } else if (this.cpu.hp > this.player.hp) {
      winner = 'LOSE'; sub = '時間切れ判定負け';
    } else {
      winner = 'DRAW'; sub = '時間切れ引き分け';
    }
    const txt = document.getElementById('result-text');
    txt.textContent = winner === 'WIN' ? '勝利!' : winner === 'LOSE' ? '敗北...' : '引き分け';
    txt.style.color = winner === 'WIN' ? '#4f5' : winner === 'LOSE' ? '#f55' : '#fa3';
    document.getElementById('result-sub').textContent = sub;
    document.getElementById('gameover').style.display = 'flex';
    this.state = 'gameover';
  }

  handlePlayerInput() {
    const p = this.player;
    if (p.state === 'ko' || p.hitstun > 0) {
      if (p.hitstun === 0 && p.state !== 'ko') p.vx = 0;
      return;
    }
    if (p.attackTimer > 0) {
      p.vx = 0;
    } else if (p.state === 'blocking') {
      p.vx = 0;
    } else {
      let moving = false;
      if (this.keys['a'] || this.keys['arrowleft']) {
        p.vx = -p.speed; moving = true;
      } else if (this.keys['d'] || this.keys['arrowright']) {
        p.vx = p.speed; moving = true;
      } else {
        p.vx = 0;
      }
      if (moving && p.onGround && p.state === 'idle') p.state = 'walking';
      else if (!moving && p.state === 'walking') p.state = 'idle';
    }

    if (p.onGround) {
      p.facing = this.cpu.x >= p.x ? 1 : -1;
    }

    if (this.justPressed['w'] || this.justPressed['arrowup']) p.jump();
    if (this.keys['s'] || this.keys['arrowdown']) p.block();
    if (this.justPressed['j']) p.punch();
    if (this.justPressed['k']) p.kick();
  }

  resolveHit(attacker, defender) {
    const hb = attacker.getHitbox();
    if (!hb) return;
    const body = defender.getBody();
    if (rectOverlap(hb, body)) {
      attacker.hasHit = true;
      const wasBlocking = defender.state === 'blocking';
      defender.takeDamage(hb.damage, attacker.x);
      this.shake = wasBlocking ? 3 : 8;
      this.spawnHitParticles(
        defender.x + defender.w / 2,
        body.y + body.h / 2,
        wasBlocking ? '#ff0' : '#fff'
      );
    }
  }

  spawnHitParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      this.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 6,
        vy: (Math.random() - 0.5) * 6 - 1,
        life: 20, color
      });
    }
  }

  updateParticles() {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.3;
      p.life--;
      if (p.life <= 0) this.particles.splice(i, 1);
    }
  }

  separateBodies() {
    const a = this.player.getBody();
    const b = this.cpu.getBody();
    if (rectOverlap(a, b)) {
      const overlap = Math.min(a.x + a.w - b.x, b.x + b.w - a.x);
      if (this.player.x < this.cpu.x) {
        this.player.x -= overlap / 2;
        this.cpu.x += overlap / 2;
      } else {
        this.player.x += overlap / 2;
        this.cpu.x -= overlap / 2;
      }
      this.player.x = Math.max(0, Math.min(ARENA_W - this.player.w, this.player.x));
      this.cpu.x = Math.max(0, Math.min(ARENA_W - this.cpu.w, this.cpu.x));
    }
  }

  updateHUD() {
    document.getElementById('p-hp').style.width = (this.player.hp / this.player.maxHp * 100) + '%';
    document.getElementById('c-hp').style.width = (this.cpu.hp / this.cpu.maxHp * 100) + '%';
    document.getElementById('timer').textContent = Math.max(0, Math.ceil(this.timer / 60));
  }

  update() {
    if (this.state === 'playing') {
      this.handlePlayerInput();
      this.ai.step();
      this.player.update();
      this.cpu.update();
      this.resolveHit(this.player, this.cpu);
      this.resolveHit(this.cpu, this.player);
      this.separateBodies();
      this.updateParticles();
      this.timer--;
      if (this.shake > 0) this.shake--;
      this.updateHUD();
      if (this.player.hp <= 0 || this.cpu.hp <= 0 || this.timer <= 0) {
        setTimeout(() => this.endMatch(), 600);
        this.state = 'ending';
      }
    } else if (this.state === 'ending') {
      this.player.update();
      this.cpu.update();
      this.updateParticles();
    }
    this.justPressed = {};
  }

  drawScene() {
    const ctx = this.ctx;
    ctx.save();
    if (this.shake > 0) {
      ctx.translate((Math.random() - 0.5) * this.shake, (Math.random() - 0.5) * this.shake);
    }

    const grad = ctx.createLinearGradient(0, 0, 0, ARENA_H);
    grad.addColorStop(0, '#1e1e3a');
    grad.addColorStop(1, '#3a2a4a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, ARENA_W, ARENA_H);

    ctx.fillStyle = 'rgba(255, 240, 200, 0.15)';
    ctx.beginPath();
    ctx.arc(640, 80, 35, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#1a1a26';
    ctx.fillRect(0, GROUND_Y, ARENA_W, ARENA_H - GROUND_Y);
    ctx.fillStyle = '#4af';
    ctx.fillRect(0, GROUND_Y, ARENA_W, 2);
    ctx.fillStyle = 'rgba(74, 170, 255, 0.15)';
    ctx.fillRect(0, GROUND_Y + 2, ARENA_W, 4);

    if (this.player) this.player.draw(ctx);
    if (this.cpu) this.cpu.draw(ctx);

    for (const p of this.particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / 20);
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;

    ctx.restore();

    if (this.state === 'menu') {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, ARENA_W, ARENA_H);
    }
  }

  loop() {
    this.update();
    this.drawScene();
    requestAnimationFrame(() => this.loop());
  }
}

const game = new Game();
game.loop();
</script>
